# ZeroRespond — full stack (stub)
# Replace image names and volumes with official Wazuh 4.x / project Dockerfiles as implementations land.
#
# Intended services (project spec):
#   - wazuh-indexer (OpenSearch-backed)
#   - wazuh-manager
#   - wazuh-dashboard (optional UI for Wazuh)
#   - zerorespond-db — PostgreSQL 15
#   - zerorespond-api — FastAPI backend
#   - zerorespond-frontend — React ZeroDashboard (static or dev server)
#   - zerorespond-alert-processor — optional separate container for polling Wazuh API
#
# Example skeleton (additional services uncommented when Dockerfiles exist):

services:
  zerorespond-db:
    image: postgres:15-alpine
    container_name: zerorespond-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zerorespond}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-zerorespond}
    volumes:
      - zerorespond_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zerorespond} -d ${POSTGRES_DB:-zerorespond}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zerorespond

  # Uncomment and configure when Dockerfiles exist:
  #
  # zerorespond-api:
