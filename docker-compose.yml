  #     - zerorespond

  # --- Wazuh stack (see https://documentation.wazuh.com/) ---
  # wazuh-indexer:
  # wazuh-manager:
  # wazuh-dashboard:

networks:
  zerorespond:
    driver: bridge

volumes:
  zerorespond_pgdata:
