# ZeroDashboard SPA: build runs from frontend/ — no "cd frontend" (Netlify already uses base).
# Output is frontend/dist relative to repo root.

[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# React Router (SPA): serve index.html for all client-side routes e.g. /dashboard, /incidents/INV-2042

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
